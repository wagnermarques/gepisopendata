<app-fixed-head [drawer]="drawer" />

<mat-drawer-container class="drawer-container">
    <mat-drawer #drawer [mode]="isSmallScreen ? 'over' : 'side'" 
        [opened]="!isSmallScreen" class="sidenav">
        <div class="drawer-header">
            <h2>Menu</h2>
        </div>

        <mat-nav-list>
            <a mat-list-item routerLink="/" (click)="drawer.close()">
                <mat-icon matListItemIcon>home</mat-icon>
                <span matListItemTitle>Home</span>
            </a>

            <mat-divider></mat-divider>

            <a mat-list-item routerLink="/about" (click)="drawer.close()">
                <mat-icon matListItemIcon>info</mat-icon>
                <span matListItemTitle>About</span>
            </a>
        </mat-nav-list>
    </mat-drawer>

    <mat-drawer-content>
        <div class="content-wrapper">
            <div style="padding: 10px; border-bottom: 1px solid #ccc; font-size: 12px; font-family: monospace;">
              Debug info: 
              isTauri: {{ isTauriDebug() }} | 
              configType: {{ configTypeDebug() }} |
              lastEvent: {{ lastMenuEvent() || 'none' }}
            </div>
            <div style="padding: 20px;">
              <h2>Loaded Configuration:</h2>
              <pre>{{ config() | json }}</pre>
            </div>
            <router-outlet />
        </div>
    </mat-drawer-content>
</mat-drawer-container>

<app-fixed-statusbar />
