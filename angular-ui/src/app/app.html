<app-fixed-head [drawer]="drawer" />

<mat-drawer-container class="drawer-container">
    <mat-drawer #drawer [mode]="isSmallScreen ? 'over' : 'side'" 
        [opened]="!isSmallScreen" class="sidenav">
        <div class="drawer-header">
            <h2>Menu</h2>
        </div>

        <mat-nav-list>
            <a mat-list-item routerLink="/" (click)="drawer.close()">
                <mat-icon matListItemIcon>home</mat-icon>
                <span matListItemTitle>Home</span>
            </a>

            <a mat-list-item routerLink="/appshomevew" (click)="drawer.close()">
                <mat-icon matListItemIcon>Shelves</mat-icon>
                <span matListItemTitle>aplicaÃ§Ãµes</span>
            </a>

            <a mat-list-item routerLink="/desktophomeview" (click)="drawer.close()">
                <mat-icon matListItemIcon>workspaces</mat-icon>
                <span matListItemTitle>desktopscripts</span>
            </a>

            <a mat-list-item routerLink="/aulas" (click)="drawer.close()">
                <mat-icon matListItemIcon>developer_mode</mat-icon>
                <span matListItemTitle>aulas</span>
            </a>

            <a mat-list-item routerLink="/baseview" (click)="drawer.close()">
                <mat-icon matListItemIcon>developer_mode</mat-icon>
                <span matListItemTitle>baseview</span>
            </a>

            <mat-divider></mat-divider>

            <mat-accordion>
                <mat-expansion-panel class="mat-elevation-z0 menu-expansion-panel">
                    <mat-expansion-panel-header>
                        <mat-panel-title>
                            <mat-icon matListItemIcon>analytics</mat-icon>
                            <span>EstatÃsticas</span>
                        </mat-panel-title>
                    </mat-expansion-panel-header>

                    <mat-nav-list>
                        <a mat-list-item 
                           matTooltip="Estudo dos dados sobre EvoluÃ§Ã£o das MatrÃculas" 
                           matTooltipPosition="right"
                           (click)="drawer.close()">
                            <mat-icon matListItemIcon>trending_up</mat-icon>
                            <span matListItemTitle>EvoluÃ§Ã£o Matriculas</span>
                        </a>

                        <a mat-list-item 
                           (click)="drawer.close()">
                            <mat-icon matListItemIcon>payments</mat-icon>
                            <span matListItemTitle>Financiamento da EducaÃ§Ã£o</span>
                        </a>
                    </mat-nav-list>
                </mat-expansion-panel>
            </mat-accordion>

            <mat-divider></mat-divider>

            <a mat-list-item routerLink="/baseview" (click)="drawer.close()">
                <mat-icon matListItemIcon>help</mat-icon>
                <span matListItemTitle>angular base view</span>
            </a>

            <a mat-list-item routerLink="/about" (click)="drawer.close()">
                <mat-icon matListItemIcon>info</mat-icon>
                <span matListItemTitle>About</span>
            </a>
        </mat-nav-list>
    </mat-drawer>

    <mat-drawer-content>
        <div class="content-wrapper">
            <div style="padding: 20px;">
              <h2>Loaded Configuration:</h2>
              <pre>{{ config() | json }}</pre>
            </div>
            <router-outlet />
        </div>
    </mat-drawer-content>
</mat-drawer-container>

<app-fixed-statusbar />
