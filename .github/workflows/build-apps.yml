name: Build Installers

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags (e.g., v0.1.0)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
          - platform: 'ubuntu-22.04' # Fedora artifacts are built here via tauri's rpm bundler

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'angular-ui/package-lock.json'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: install root dependencies (Tauri CLI)
        run: npm install

      - name: install frontend dependencies
        run: npm install
        working-directory: ./angular-ui

      - name: build frontend
        run: npm run build -- --configuration production
        working-directory: ./angular-ui

      - name: Inject version from tag
        shell: bash
        run: |
          # If triggered by a tag like v0.1.3, use 0.1.3. 
          # Otherwise use the version in tauri.conf.json.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_VERSION=${GITHUB_REF_NAME#v}
            echo "Setting version to $TAG_VERSION"
            jq ".version = \"$TAG_VERSION\"" tauri.conf.json > tauri.conf.json.tmp && mv tauri.conf.json.tmp tauri.conf.json
          fi

      - name: Build Tauri bundle
        env:
          TAURI_DIR: .
        run: |
          npx tauri build

      - name: Show bundle contents (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          echo "Contents of src-tauri\target\release\bundle"
          dir target\release\bundle\* -Recurse || echo "bundle folder not found"

      - name: Show bundle contents (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          echo "Contents of target/release/bundle"
          ls -la target/release/bundle || true

      - name: Upload Linux build artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: ./target/release/bundle/*

      - name: Rename Windows Installer
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          # Get version from tag or tauri.conf.json
          VERSION=$(jq -r .version tauri.conf.json)
          OLD_FILE="target/release/bundle/nsis/Gepis Dados Abertos_${VERSION}_x64-setup.exe"
          NEW_FILE="target/release/bundle/nsis/Gepis-Dados-Abertos-v${VERSION}-Setup.exe"
          
          if [ -f "$OLD_FILE" ]; then
            mv "$OLD_FILE" "$NEW_FILE"
            echo "Renamed $OLD_FILE to $NEW_FILE"
          else
            echo "Warning: Could not find $OLD_FILE"
            ls -R target/release/bundle/nsis/
          fi

      - name: Create GitHub Release and upload Windows installers
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ./target/release/bundle/**/*.exe
            ./target/release/bundle/**/*.msi
          tag_name: ${{ github.ref_name }}
          name: "Gepis Dados Abertos ${{ github.ref_name }}"
          body: "Novas versões para Windows e Fedora."
          draft: true
          prerelease: false
